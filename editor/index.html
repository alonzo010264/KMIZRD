<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador de Poloches - KMIZRD</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f8fafc;
            --card-border: #e2e8f0;
            --accent-color: #0272ba;
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .editor-header {
            background-color: #ffffff;
            border-bottom: 1px solid var(--card-border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }

        .editor-header .logo img {
            height: 40px;
            border-radius: 4px;
        }

        .editor-header .nav-links a {
            color: var(--text-muted);
            font-weight: 500;
            margin-left: 20px;
            transition: color 0.3s;
        }

        .editor-header .nav-links a:hover,
        .editor-header .nav-links a.active {
            color: var(--text-dark);
        }

        /* Layout */
        .editor-layout {
            display: grid;
            grid-template-columns: 1fr 420px;
            flex: 1;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 30px;
            gap: 30px;
            height: calc(100vh - 72px);
        }

        @media (max-width: 1024px) {
            .editor-layout {
                grid-template-columns: 1fr;
                height: auto;
                padding: 15px;
            }
        }

        /* Workspace Card Frame (Match screenshot) */
        .workspace {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            position: relative;
            aspect-ratio: 1;
            max-height: 650px;
            overflow: hidden;
        }

        /* Watermark Globe */
        .watermark-bg {
            position: absolute;
            width: 85%;
            height: 85%;
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .watermark-bg svg {
            width: 100%;
            height: 100%;
            color: #64748b;
        }

        /* Garment Holder */
        .garment-container {
            position: relative;
            width: 75%;
            height: 75%;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .garment-svg {
            width: 100%;
            height: 100%;
            transition: transform 0.3s ease;
        }

        /* Print Bounds Area */
        .printable-area {
            position: absolute;
            top: 22%;
            left: 29%;
            width: 42%;
            height: 58%;
            z-index: 10;
            border: 1px dashed rgba(0, 0, 0, 0.15);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Drag & Drop Graphic */
        .design-element {
            position: absolute;
            cursor: grab;
            width: 150px;
            height: 150px;
            transform-origin: center center;
            touch-action: none;
        }

        .design-element:active {
            cursor: grabbing;
        }

        .design-element img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        /* Overlay Round Nav Buttons (Match screenshot) */
        .arrow-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(30, 41, 59, 0.65);
            border: none;
            color: #ffffff;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: background-color 0.3s, transform 0.2s;
            font-size: 18px;
        }

        .arrow-btn:hover {
            background-color: rgba(15, 23, 42, 0.85);
            transform: translateY(-50%) scale(1.05);
        }

        .arrow-left { left: 20px; }
        .arrow-right { right: 20px; }

        /* Floating Upload Button (Match bottom left screenshot icon) */
        .floating-upload {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background-color: rgba(30, 41, 59, 0.65);
            border: none;
            color: #ffffff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: background-color 0.3s, transform 0.2s;
            font-size: 18px;
        }

        .floating-upload:hover {
            background-color: rgba(15, 23, 42, 0.85);
            transform: scale(1.05);
        }

        /* Sidebar Controls */
        .control-sidebar {
            background-color: #ffffff;
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 20px;
            font-weight: 800;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        /* View Toggle Tabs */
        .toggle-tabs {
            display: flex;
            background-color: #f1f5f9;
            border-radius: 30px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 8px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 20px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background-color: var(--accent-color);
            color: #ffffff;
        }

        /* Colors Grid */
        .color-palette-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .color-swatch-item {
            aspect-ratio: 1;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }

        .color-swatch-item:hover {
            transform: scale(1.1);
        }

        .color-swatch-item.active {
            border-color: var(--text-dark);
            transform: scale(1.05);
        }

        .color-swatch-item.active::after {
            content: "\f00c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            color: #ffffff;
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }

        /* Adjustment sliders */
        .adjust-container {
            background-color: #f8fafc;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .adjust-slider-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .adjust-slider-row label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            width: 60px;
        }

        .adjust-slider-row input[type="range"] {
            flex: 1;
            accent-color: var(--accent-color);
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            cursor: pointer;
        }

        /* Upload Area */
        .dropzone-area {
            border: 2px dashed var(--card-border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dropzone-area:hover {
            border-color: var(--accent-color);
            background-color: rgba(2, 114, 186, 0.02);
        }

        .dropzone-area i {
            font-size: 24px;
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        .dropzone-area p {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Pricing display */
        .price-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f8fafc;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px 18px;
        }

        .price-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .price-amount {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-dark);
        }

        /* Action Buttons */
        .whatsapp-submit-btn {
            background: linear-gradient(135deg, var(--accent-color) 0%, #005a96 100%);
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(2, 114, 186, 0.2);
        }

        .whatsapp-submit-btn:hover {
            box-shadow: 0 6px 18px rgba(2, 114, 186, 0.35);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <header class="editor-header">
        <a href="../" class="logo">
            <img src="../assets/logo.jpg" alt="KMIZRD Logo">
        </a>
        <div class="nav-links">
            <a href="../">Inicio</a>
            <a href="../camisetas/">Colecciones</a>
            <a href="../faq.html">Preguntas Frecuentes</a>
            <a href="#" class="active">Editor Vectorial</a>
        </div>
    </header>

    <main class="editor-layout">
        <!-- Workspace Card Frame (Left) -->
        <section class="workspace">
            <div class="watermark-bg">
                <!-- Watermark Globe Grid SVG matching user reference screenshot -->
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="0.6" />
                    <ellipse cx="50" cy="50" rx="30" ry="48" fill="none" stroke="currentColor" stroke-width="0.6" />
                    <ellipse cx="50" cy="50" rx="15" ry="48" fill="none" stroke="currentColor" stroke-width="0.6" />
                    <line x1="2" y1="50" x2="98" y2="50" stroke="currentColor" stroke-width="0.6" />
                    <line x1="6" y1="30" x2="94" y2="30" stroke="currentColor" stroke-width="0.6" />
                    <line x1="6" y1="70" x2="94" y2="70" stroke="currentColor" stroke-width="0.6" />
                    <line x1="14" y1="15" x2="86" y2="15" stroke="currentColor" stroke-width="0.6" />
                    <line x1="14" y1="85" x2="86" y2="85" stroke="currentColor" stroke-width="0.6" />
                    <text x="50" y="52" font-size="5" fill="currentColor" font-weight="900" text-anchor="middle" font-family="'Outfit', sans-serif" letter-spacing="1">KMIZRD</text>
                </svg>
            </div>

            <!-- Left Arrow Overlay -->
            <button class="arrow-btn arrow-left" id="prev-btn" aria-label="Anterior">
                <i class="fas fa-chevron-left"></i>
            </button>

            <!-- T-Shirt Holder -->
            <div class="garment-container">
                <div class="garment-svg" id="garment-svg">
                    <!-- SVG gets injected via JavaScript -->
                </div>

                <!-- Draggable design wrapper over shirt body -->
                <div class="printable-area" id="print-area">
                    <div class="design-element" id="design-element" style="display: none;">
                        <img src="" id="design-img" alt="Diseño">
                    </div>
                </div>
            </div>

            <!-- Right Arrow Overlay -->
            <button class="arrow-btn arrow-right" id="next-btn" aria-label="Siguiente">
                <i class="fas fa-chevron-right"></i>
            </button>

            <!-- Bottom Left Floating Upload Button (Matches screenshot image icon) -->
            <button class="floating-upload" id="float-upload-trigger" title="Cambiar diseño">
                <i class="fas fa-images"></i>
            </button>
        </section>

        <!-- Sidebar Panel Controls (Right) -->
        <section class="control-sidebar">
            <h1 class="sidebar-title">
                <i class="fas fa-magic" style="color: var(--accent-color);"></i>
                Editor de Poloches
            </h1>

            <!-- Front / Back View toggles -->
            <div>
                <h3 class="control-section-title">Vista del Poloche</h3>
                <div class="toggle-tabs">
                    <div class="tab-btn active" id="tab-front" data-view="front">Frente</div>
                    <div class="tab-btn" id="tab-back" data-view="back">Espalda</div>
                </div>
            </div>

            <!-- Colors Grid Selector -->
            <div>
                <h3 class="control-section-title">Color de la Prenda</h3>
                <div class="color-palette-grid" id="color-palette">
                    <!-- Color Swatches loaded via JS -->
                </div>
            </div>

            <!-- Sliders settings -->
            <div>
                <h3 class="control-section-title">Ajustes del Diseño</h3>
                <div class="adjust-container">
                    <div class="adjust-slider-row">
                        <label for="slider-scale">Tamaño</label>
                        <input type="range" id="slider-scale" min="30" max="250" value="100">
                    </div>
                    <div class="adjust-slider-row">
                        <label for="slider-rotate">Rotación</label>
                        <input type="range" id="slider-rotate" min="-180" max="180" value="0">
                    </div>
                </div>
            </div>

            <!-- File Upload Dropzone -->
            <div>
                <h3 class="control-section-title">Subir Diseño</h3>
                <div class="dropzone-area" id="drop-zone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Arrastra tu logo aquí o <strong>haz clic para buscar</strong></p>
                    <input type="file" id="image-loader" accept="image/*" style="display: none;">
                </div>
            </div>

            <!-- Price -->
            <div class="price-container">
                <span class="price-title">Precio estimado</span>
                <span class="price-amount" id="price-val">$1,200.00</span>
            </div>

            <!-- Action Button -->
            <button class="whatsapp-submit-btn" id="submit-whatsapp">
                <i class="fab fa-whatsapp"></i>
                Enviar por WhatsApp
            </button>
        </section>
    </main>

    <script>
        // High quality vector outlines matching the boxy streetwear oversized look in screenshot
        const SVGs = {
            front: (color) => `
                <svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                    <!-- Inner neck shadow and tag -->
                    <path d="M 38,17 C 38,17 50,19.5 62,17 C 50,23.5 38,17 38,17 Z" fill="#b8c2cc" stroke="#111111" stroke-width="1" />
                    <rect x="47.5" y="18.5" width="5" height="3" fill="#111111" />
                    <text x="50" y="20.5" font-size="1.2" fill="#ffffff" text-anchor="middle" font-weight="bold" font-family="'Outfit', sans-serif">KMIZRD</text>

                    <!-- Main Shirt Body -->
                    <path class="tshirt-fill" d="
                        M 38,17 
                        C 42,23.5 58,23.5 62,17 
                        L 77,21.5 
                        L 89,40 
                        L 78,47 
                        L 71,38 
                        L 71,83 
                        L 29,83 
                        L 29,38 
                        L 22,47 
                        L 11,40 
                        L 23,21.5 
                        Z" 
                        fill="${color}" stroke="#111111" stroke-width="1.8" stroke-linejoin="round" />
                        
                    <!-- Collar ribbing curve -->
                    <path d="M 38,17 C 42,23.5 58,23.5 62,17" fill="none" stroke="#111111" stroke-width="1.8" />
                    <path d="M 39,15.5 C 43,21.5 57,21.5 61,15.5" fill="none" stroke="#111111" stroke-width="1" />
                    
                    <!-- Stitching on shoulders -->
                    <path d="M 23,21.5 L 29,38" fill="none" stroke="#111111" stroke-width="1" stroke-dasharray="1.5,1.5" />
                    <path d="M 77,21.5 L 71,38" fill="none" stroke="#111111" stroke-width="1" stroke-dasharray="1.5,1.5" />
                    
                    <!-- Sleeve cuffs -->
                    <path d="M 11,40 L 22,47" fill="none" stroke="#111111" stroke-width="1.5" />
                    <path d="M 89,40 L 78,47" fill="none" stroke="#111111" stroke-width="1.5" />
                    
                    <!-- Bottom hem -->
                    <path d="M 29,83 L 71,83" fill="none" stroke="#111111" stroke-width="1.5" />
                </svg>
            `,
            back: (color) => `
                <svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                    <!-- Main Shirt Body -->
                    <path class="tshirt-fill" d="
                        M 38,17 
                        C 42,19.5 58,19.5 62,17 
                        L 77,21.5 
                        L 89,40 
                        L 78,47 
                        L 71,38 
                        L 71,83 
                        L 29,83 
                        L 29,38 
                        L 22,47 
                        L 11,40 
                        L 23,21.5 
                        Z" 
                        fill="${color}" stroke="#111111" stroke-width="1.8" stroke-linejoin="round" />
                        
                    <!-- Collar (Back curve is higher) -->
                    <path d="M 38,17 C 42,19.5 58,19.5 62,17" fill="none" stroke="#111111" stroke-width="1.8" />
                    <path d="M 39,15.5 C 43,17.5 57,17.5 61,15.5" fill="none" stroke="#111111" stroke-width="1" />
                    
                    <!-- Stitching on shoulders -->
                    <path d="M 23,21.5 L 29,38" fill="none" stroke="#111111" stroke-width="1" stroke-dasharray="1.5,1.5" />
                    <path d="M 77,21.5 L 71,38" fill="none" stroke="#111111" stroke-width="1" stroke-dasharray="1.5,1.5" />
                    
                    <!-- Sleeve cuffs -->
                    <path d="M 11,40 L 22,47" fill="none" stroke="#111111" stroke-width="1.5" />
                    <path d="M 89,40 L 78,47" fill="none" stroke="#111111" stroke-width="1.5" />
                    
                    <!-- Bottom hem -->
                    <path d="M 29,83 L 71,83" fill="none" stroke="#111111" stroke-width="1.5" />
                </svg>
            `
        };

        // Color selection
        const Colors = [
            { name: 'Crema', hex: '#f3ebd9' },
            { name: 'Blanco', hex: '#ffffff' },
            { name: 'Negro Mate', hex: '#1e1e1e' },
            { name: 'Gris Carbón', hex: '#5b616a' },
            { name: 'Rojo Street', hex: '#b91c1c' },
            { name: 'Verde Pino', hex: '#1e3f20' },
            { name: 'Azul Denim', hex: '#1e3a8a' },
            { name: 'Camel / Arena', hex: '#c5a880' }
        ];

        // State definition
        const state = {
            color: '#f3ebd9',
            view: 'front',
            front: { img: null, scale: 100, rotation: 0, x: 0, y: 0 },
            back: { img: null, scale: 100, rotation: 0, x: 0, y: 0 }
        };

        // Element lookup
        const garmentSvgHolder = document.getElementById('garment-svg');
        const printArea = document.getElementById('print-area');
        const designWrapper = document.getElementById('design-element');
        const designImgElement = document.getElementById('design-img');
        const colorPalette = document.getElementById('color-palette');
        const tabFront = document.getElementById('tab-front');
        const tabBack = document.getElementById('tab-back');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const floatUpload = document.getElementById('float-upload-trigger');
        const dropZone = document.getElementById('drop-zone');
        const imageLoader = document.getElementById('image-loader');
        const sliderScale = document.getElementById('slider-scale');
        const sliderRotate = document.getElementById('slider-rotate');
        const submitWhatsapp = document.getElementById('submit-whatsapp');

        // Render poloche shape
        function updateGarmentView() {
            garmentSvgHolder.innerHTML = SVGs[state.view](state.color);
            refreshDesignProperties();
        }

        // Color swatches render
        function updateColorPalette() {
            colorPalette.innerHTML = '';
            Colors.forEach(item => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch-item';
                swatch.style.backgroundColor = item.hex;
                swatch.title = item.name;
                if (item.hex === state.color) swatch.classList.add('active');
                
                swatch.addEventListener('click', () => {
                    document.querySelectorAll('.color-swatch-item').forEach(el => el.classList.remove('active'));
                    swatch.classList.add('active');
                    state.color = item.hex;
                    updateGarmentView();
                });
                
                colorPalette.appendChild(swatch);
            });
        }

        // Apply scaling, dragging and rotation styles
        function refreshDesignProperties() {
            const current = state[state.view];
            if (current.img) {
                designImgElement.src = current.img;
                designWrapper.style.display = 'block';
                designWrapper.style.transform = `translate(${current.x}px, ${current.y}px) scale(${current.scale / 100}) rotate(${current.rotation}deg)`;
            } else {
                designWrapper.style.display = 'none';
            }
        }

        // Switch front/back views
        function toggleViewMode(viewName) {
            state.view = viewName;
            if (viewName === 'front') {
                tabFront.classList.add('active');
                tabBack.classList.remove('active');
            } else {
                tabBack.classList.add('active');
                tabFront.classList.remove('active');
            }

            // Sync sliders
            const current = state[state.view];
            sliderScale.value = current.scale;
            sliderRotate.value = current.rotation;

            updateGarmentView();
        }

        // File loading handling
        function uploadImageFile(file) {
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    state[state.view].img = e.target.result;
                    refreshDesignProperties();
                };
                reader.readAsDataURL(file);
            }
        }

        // Upload triggers
        dropZone.addEventListener('click', () => imageLoader.click());
        floatUpload.addEventListener('click', () => imageLoader.click());
        imageLoader.addEventListener('change', (e) => uploadImageFile(e.target.files[0]));

        // Drag & Drop files
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--accent-color)';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = 'var(--card-border)';
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--card-border)';
            uploadImageFile(e.dataTransfer.files[0]);
        });

        // Tab and arrow bindings
        tabFront.addEventListener('click', () => toggleViewMode('front'));
        tabBack.addEventListener('click', () => toggleViewMode('back'));
        prevBtn.addEventListener('click', () => toggleViewMode(state.view === 'front' ? 'back' : 'front'));
        nextBtn.addEventListener('click', () => toggleViewMode(state.view === 'front' ? 'back' : 'front'));

        // Adjustments Sliders
        sliderScale.addEventListener('input', (e) => {
            state[state.view].scale = parseInt(e.target.value);
            refreshDesignProperties();
        });
        sliderRotate.addEventListener('input', (e) => {
            state[state.view].rotation = parseInt(e.target.value);
            refreshDesignProperties();
        });

        // Dragging Design Element Logic
        let dragActive = false;
        let startCursorX, startCursorY;

        designWrapper.addEventListener('mousedown', initiateDrag);
        designWrapper.addEventListener('touchstart', initiateDrag, { passive: false });

        function initiateDrag(e) {
            dragActive = true;
            const current = state[state.view];
            const ptr = e.touches ? e.touches[0] : e;
            startCursorX = ptr.clientX - current.x;
            startCursorY = ptr.clientY - current.y;
            e.preventDefault();
        }

        document.addEventListener('mousemove', performDrag);
        document.addEventListener('touchmove', performDrag, { passive: false });

        function performDrag(e) {
            if (!dragActive) return;
            const current = state[state.view];
            const ptr = e.touches ? e.touches[0] : e;
            current.x = ptr.clientX - startCursorX;
            current.y = ptr.clientY - startCursorY;
            refreshDesignProperties();
            e.preventDefault();
        }

        document.addEventListener('mouseup', () => dragActive = false);
        document.addEventListener('touchend', () => dragActive = false);

        // WhatsApp integration
        submitWhatsapp.addEventListener('click', () => {
            const selectedColor = Colors.find(c => c.hex === state.color)?.name || 'Personalizado';
            let message = `🚀 *Nuevo pedido personalizado de Poloche KMIZRD* 🚀%0A%0A`;
            message += `• *Color:* ${selectedColor}%0A`;
            message += `• *Frente:* ${state.front.img ? 'Tiene diseño cargado ✅' : 'Liso (sin diseño) ❌'}%0A`;
            message += `• *Espalda:* ${state.back.img ? 'Tiene diseño cargado ✅' : 'Liso (sin diseño) ❌'}%0A%0A`;
            message += `_¡Enviado desde el editor para iniciar la fabricación!_`;

            window.open(`https://wa.me/18090000000?text=${message}`, '_blank');
        });

        // Initial launch
        updateGarmentView();
        updateColorPalette();
    </script>
</body>
</html>
