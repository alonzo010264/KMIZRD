<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Polos - KMIZRD</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --editor-bg: #f8fafc;
            --accent-color: #0272ba;
        }
        body {background-color: var(--editor-bg); font-family: 'Inter', sans-serif;}
        .editor-container {display: flex; flex-direction: column; max-width: 1200px; margin: 40px auto; gap: 30px;}
        .preview-area {position: relative; width: 100%; max-width: 500px; margin: 0 auto;}
        .preview-area img.base {width: 100%; display: block;}
        .preview-area .tint {position: absolute; inset: 0; mix-blend-mode: multiply; pointer-events: none;}
        .preview-area .design {position: absolute; top: 20%; left: 20%; width: 60%; height: 60%; cursor: move; display: none;}
        .controls {display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start;}
        .controls label {font-weight: 600; margin-bottom: 4px; display: block;}
        .controls input[type="color"] {width: 100%; height: 40px; border: none; cursor: pointer;}
        .controls input[type="number"] {width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px;}
        .controls button {padding: 10px 20px; background: var(--accent-color); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;}
        .toggle-btns button {background: #e2e8f0; color: #444;}
        .toggle-btns button.active {background: var(--accent-color); color: #fff;}
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="../" class="logo"><img src="../assets/logo.jpg" alt="KMIZRD" class="logo-img"></a>
            <nav class="nav">
                <a href="../camisetas/" class="nav-link">Camisetas</a>
                <a href="../polo/" class="nav-link">Polo</a>
                <a href="../editor/" class="nav-link active">Crea tu Diseño</a>
            </nav>
        </div>
    </header>

    <main class="editor-container">
        <section class="preview-area">
            <img src="../assets/plain_polo.png" alt="Polo" class="base" id="polo-base">
            <div class="tint" id="color-tint"></div>
            <img src="" alt="Diseño" class="design" id="design-img">
            <div class="view-toggle toggle-btns">
                <button id="btn-front" class="active">Frente</button>
                <button id="btn-back">Espalda</button>
            </div>
        </section>
        <section class="controls">
            <div>
                <label for="color-picker">Color del polo</label>
                <input type="color" id="color-picker" value="#ffffff">
            </div>
            <div>
                <label for="price-input">Precio ($)</label>
                <input type="number" id="price-input" placeholder="Ej. 1999" min="0">
            </div>
            <div>
                <label for="upload-design">Subir diseño (PNG/JPG)</label>
                <input type="file" id="upload-design" accept="image/*">
            </div>
            <div>
                <button id="whatsapp-btn">Enviar por WhatsApp</button>
            </div>
        </section>
    </main>

    <script>
        // Toggle front/back (same placeholder for now)
        const btnFront = document.getElementById('btn-front');
        const btnBack = document.getElementById('btn-back');
        const poloBase = document.getElementById('polo-base');
        btnFront.addEventListener('click', () => {
            btnFront.classList.add('active');
            btnBack.classList.remove('active');
            // Front placeholder – same image
            poloBase.src = '../assets/plain_polo.png';
        });
        btnBack.addEventListener('click', () => {
            btnBack.classList.add('active');
            btnFront.classList.remove('active');
            // Back placeholder – for simplicity use same image
            poloBase.src = '../assets/plain_polo.png';
        });
        // Color tint
        const colorPicker = document.getElementById('color-picker');
        const tintDiv = document.getElementById('color-tint');
        colorPicker.addEventListener('input', (e) => {
            tintDiv.style.backgroundColor = e.target.value + '80'; // 50% opacity
        });
        // Upload design
        const uploadInput = document.getElementById('upload-design');
        const designImg = document.getElementById('design-img');
        uploadInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                designImg.src = ev.target.result;
                designImg.style.display = 'block';
            };
            reader.readAsDataURL(file);
        });
        // Simple drag for design
        let isDragging = false;
        let offsetX, offsetY;
        designImg.addEventListener('mousedown', (e) => {
            isDragging = true;
            const rect = designImg.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
            e.preventDefault();
        });
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const parentRect = designImg.parentElement.getBoundingClientRect();
            const left = e.clientX - parentRect.left - offsetX;
            const top = e.clientY - parentRect.top - offsetY;
            designImg.style.left = left + 'px';
            designImg.style.top = top + 'px';
        });
        document.addEventListener('mouseup', () => { isDragging = false; });
        // WhatsApp integration
        const whatsappBtn = document.getElementById('whatsapp-btn');
        whatsappBtn.addEventListener('click', () => {
            const price = document.getElementById('price-input').value || 'N/A';
            const text = encodeURIComponent(`Quiero un polo personalizado. Precio: $${price}.`);
            const phone = '18090000000';
            const url = `https://wa.me/${phone}?text=${text}`;
            window.open(url, '_blank');
        });
    </script>
</body>
</html>
